# Netlify Configuration

# Build settings
[build]
command = "npm run build"
functions = "netlify/functions"
publish = "dist"

# Environment variables (set in Netlify dashboard or here)
[env]
[env.production]
DATABASE_URL = ""  # Set in Netlify dashboard
JWT_SECRET = ""    # Set in Netlify dashboard

# Rewrite all API routes to netlify functions
# This maps /api/* requests to the corresponding function files
[[redirects]]
from = "/api/auth/:sub*"
to = "/.netlify/functions/auth?sub=:sub"
status = 200

[[redirects]]
from = "/api/verify-email*"
to = "/.netlify/functions/auth?sub=verify-email"
status = 200

[[redirects]]
from = "/api/resend-verification*"
to = "/.netlify/functions/auth?sub=resend-verification"
status = 200

[[redirects]]
from = "/api/quizzes/:sub*"
to = "/.netlify/functions/quizzes?sub=:sub"
status = 200

[[redirects]]
from = "/api/results/:sub*"
to = "/.netlify/functions/results?sub=:sub"
status = 200

[[redirects]]
from = "/api/users/:sub*"
to = "/.netlify/functions/users?sub=:sub"
status = 200

[[redirects]]
from = "/api/assignments/:sub*"
to = "/.netlify/functions/assignments?sub=:sub"
status = 200

[[redirects]]
from = "/api/notifications/:sub*"
to = "/.netlify/functions/notifications?sub=:sub"
status = 200

[[redirects]]
from = "/api/questions/:sub*"
to = "/.netlify/functions/questions?sub=:sub"
status = 200

[[redirects]]
from = "/api/certificates/:sub*"
to = "/.netlify/functions/certificates?sub=:sub"
status = 200

[[redirects]]
from = "/api/reports*"
to = "/.netlify/functions/reports"
status = 200

# SPA fallback - handle client-side routing
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
